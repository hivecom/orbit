[package]
name = "core-wasm"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2.125"
wasm-bindgen-futures = "0.4.75"
futures = "0.3.32"
console_error_panic_hook = "0.1.7"

gloo-console = "0.4.0"
gloo-net = "0.7.0"

irc-proto = "1.1.0"
serde = { version = "1.0.228", features = ["derive"] }
serde-wasm-bindgen = "0.6.5"
