name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # pnpm version comes from the "packageManager" field in package.json
      - run: corepack enable

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # The `ready` gate, split into steps for clearer failure attribution.
      - name: Check (format, lint, types)
        run: pnpm exec vp check

      - name: Test
        run: pnpm exec vp run -r test

      - name: Build
        run: pnpm exec vp run -r build
