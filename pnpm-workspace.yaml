packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: 4.1.9
  vite-plus: ^0.2.1
  "@dolanske/vui": ^1.17.2
  vue-router: ^5.1.0
  pinia: ^3.0.4
  "@vue/test-utils": ^2.4.11
  jsdom: ^29.1.1
  "@tauri-apps/cli": ^2.11.3
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
# Vue-3-only project: let vue-demi run its postinstall so it resolves against
# Vue 3. @parcel/watcher's native build is optional (it has a JS fallback), so
# we skip it rather than depend on a toolchain at install time.
# Build script approval for pnpm 11. vue-demi must run its postinstall to
# patch itself for Vue 3; @parcel/watcher's native build is optional (JS
# fallback exists) so we skip it rather than depend on a native toolchain.
allowBuilds:
  "@parcel/watcher": false
  vue-demi: true
minimumReleaseAgeExclude:
  - "@dolanske/vui"
