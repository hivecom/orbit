packages:
  - apps/*
  - packages/*
  - tools/*

catalogMode: prefer

catalog:
  "@types/node": ^24
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.24
  vite-plus: latest
  "@dolanske/vui": ^1.15.2
  vue-router: ^5.1.0
  pinia: ^3.0.4
  "@vue/test-utils": ^2.4.11
  jsdom: ^29.1.1
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
allowBuilds:
  "@parcel/watcher": set this to true or false
  vue-demi: set this to true or false
